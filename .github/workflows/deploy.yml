name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy files to a new release folder
        run: |
          RELEASE_ID="${{ github.sha }}"
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ~/releases/$RELEASE_ID"
          rsync -az --delete --delete-excluded \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".gitignore" \
            --exclude "README.md" \
            --exclude "deploy.sh" \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/releases/$RELEASE_ID/

      - name: Switch current symlink + keep last 5 releases
        run: |
          RELEASE_ID="${{ github.sha }}"
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            ln -sfn ~/releases/$RELEASE_ID ~/current &&
            ls -1dt ~/releases/* | tail -n +6 | xargs -r rm -rf
          "
